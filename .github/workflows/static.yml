<!DOCTYPE html><html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffd700;--bg1:#020111;--bg2:#0a1a3a}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Nastaliq Urdu',serif;background:radial-gradient(circle at 50% 120%,var(--bg2),var(--bg1));color:#fff;overflow:hidden}/* INPUT SCREEN */ #inputScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10} .title{font-size:2.6rem;color:var(--gold);text-shadow:0 0 20px var(--gold)} .sub{opacity:.8;margin-top:6px} input{margin-top:18px;padding:14px 16px;border-radius:14px;border:none;font-size:1.1rem;width:min(80vw,320px);text-align:center} button{margin-top:14px;padding:12px 26px;border-radius:14px;border:none;background:var(--gold);font-weight:700;cursor:pointer;box-shadow:0 10px 30px rgba(255,215,0,.3)}

/* MAIN */ #main{position:fixed;inset:0;opacity:0;transition:opacity 1.2s ease} #main.show{opacity:1}

/* MOON */ .moon{position:absolute;top:60px;right:60px;width:140px;height:140px;border-radius:50%;background:var(--gold);box-shadow:0 0 60px var(--gold),0 0 120px rgba(255,215,0,.5)} .moon:after{content:"";position:absolute;inset:0;border-radius:50%;transform:translateX(18px);background:radial-gradient(circle at 40% 40%,transparent 55%,#000 56%)}

/* MOSQUE (SVG – no broken image) */ .mosque{position:absolute;left:0;right:0;bottom:0;height:240px}

/* TEXT */ #eidText{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%) scale(.6);font-size:3rem;color:var(--gold);text-align:center;opacity:0;transition:all 1.2s ease;text-shadow:0 0 25px var(--gold)} #eidText.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* STARS */ .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate} @keyframes twinkle{from{opacity:.2}to{opacity:1}}

/* LANTERNS */ .lantern{position:absolute;width:14px;height:18px;background:var(--gold);border-radius:3px;box-shadow:0 0 12px var(--gold);animation:floatUp linear infinite} @keyframes floatUp{from{transform:translateY(0);opacity:1}to{transform:translateY(-110vh);opacity:0}}

/* FIREWORK */ .fire{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:boom 900ms ease-out forwards} @keyframes boom{0%{transform:scale(0);opacity:1}100%{transform:scale(10);opacity:0}}

/* GLOW OVERLAY */ .glow{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 40%,rgba(255,215,0,.08));pointer-events:none} </style>

</head>
<body><div id="inputScreen">
  <div class="title">🌙 عید مبارک 🌙</div>
  <div class="sub">اپنا نام درج کریں</div>
  <input id="nameInput" placeholder="آپ کا نام" />
  <button onclick="startEid()">Start</button>
</div><div id="main">
  <div class="moon"></div>  <!-- Inline SVG Mosque -->  <svg class="mosque" viewBox="0 0 1000 240" preserveAspectRatio="none">
    <g fill="#0b0b0b">
      <rect x="0" y="140" width="1000" height="100"/>
      <rect x="120" y="120" width="180" height="120"/>
      <rect x="700" y="120" width="180" height="120"/>
      <rect x="360" y="100" width="280" height="140"/>
      <circle cx="500" cy="100" r="60"/>
      <rect x="485" y="20" width="30" height="80"/>
      <circle cx="500" cy="15" r="10" fill="#ffd700"/>
    </g>
  </svg>  <div id="eidText"></div>
  <div class="glow"></div>
</div><audio id="music" preload="auto" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/21/audio_9c1b9f0b4f.mp3" type="audio/mpeg">
</audio><script>
// stars
for(let i=0;i<140;i++){const s=document.createElement('div');s.className='star';s.style.top=Math.random()*100+'vh';s.style.left=Math.random()*100+'vw';s.style.animationDuration=(1+Math.random()*2)+'s';document.body.appendChild(s)}

function lanterns(){setInterval(()=>{const l=document.createElement('div');l.className='lantern';l.style.left=Math.random()*100+'vw';l.style.bottom='-20px';l.style.animationDuration=(6+Math.random()*6)+'s';document.body.appendChild(l);setTimeout(()=>l.remove(),12000)},700)}

function fireworks(){setInterval(()=>{const f=document.createElement('div');f.className='fire';f.style.left=Math.random()*100+'vw';f.style.top=Math.random()*70+'vh';document.body.appendChild(f);setTimeout(()=>f.remove(),900)},260)}

function startEid(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){alert('براہ کرم نام درج کریں');return}

  document.getElementById('inputScreen').style.display='none';
  const main=document.getElementById('main');main.classList.add('show');

  const t=document.getElementById('eidText');
  t.innerHTML = `✨ ${name} کو عید مبارک 🌙`;
  setTimeout(()=>t.classList.add('show'),300);

  // start music after user interaction (works on mobile)
  const m=document.getElementById('music');
  m.volume=0.6; m.play().catch(()=>{});

  lanterns();
  fireworks();
}
</script></body>
</html>
